[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.intl", "php83Extensions.bcmath", "php83Extensions.tokenizer", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.ctype", "php83Packages.composer", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/logs",
    "chmod -R 777 bootstrap/cache storage/framework storage/logs",
    "export APP_ENV=production && composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install",
    "npm run build"
]

[phases.build]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/logs",
    "chmod -R 777 bootstrap/cache storage/framework storage/logs",
    "test -f .env || cp .env.example .env"
]

[start]
cmd = "bash -c 'mkdir -p bootstrap/cache storage/framework/cache/data storage/logs && chmod -R 777 bootstrap/cache storage/framework storage/logs && php artisan key:generate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php -S 0.0.0.0:${PORT:-8000} -t public'"
