[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.intl", "php83Extensions.bcmath", "php83Extensions.tokenizer", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.ctype", "php83Packages.composer", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/views storage/logs",
    "chmod -R 777 bootstrap/cache storage/framework storage/logs",
    "export APP_ENV=production CACHE_DRIVER=array && composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install",
    "npm run build"
]

[phases.build]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/views storage/logs storage/app",
    "chmod -R 777 bootstrap/cache storage/framework storage/logs storage/app",
    "echo '{\"application_installation\": \"Completed\"}' > storage/app/installation.json",
    "echo '{\"application_migration\": \"true\"}' > storage/app/.migration",
    "export APP_ENV=production CACHE_DRIVER=array APP_ID=ustam-app APP_KEY=base64:gMxFHKGygB1jW74kQ517Rvw4j4fjpZBsjoI/HaYdd/8= && php artisan key:generate --force"
]

[start]
cmd = "bash -c 'mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/views storage/logs storage/app && chmod -R 777 bootstrap/cache storage/framework storage/logs storage/app && export APP_ENV=production CACHE_DRIVER=array APP_ID=ustam-app APP_KEY=base64:gMxFHKGygB1jW74kQ517Rvw4j4fjpZBsjoI/HaYdd/8= && php artisan migrate --force && php artisan db:seed --force && echo \"{\\\"application_installation\\\": \\\"Completed\\\"}\" > storage/app/installation.json && echo \"{\\\"application_migration\\\": \\\"true\\\"}\" > storage/app/.migration && php -S 0.0.0.0:${PORT:-8000} -t public'"
